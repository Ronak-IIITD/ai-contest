<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>SPA Settings</title>
    <style>
      :root {
        --bg-primary: #0f1419;
        --bg-secondary: #1c2128;
        --bg-tertiary: #242b33;
        --border-color: #30363d;
        --text-primary: #e6edf3;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --accent-blue: #58a6ff;
        --accent-green: #3fb950;
        --accent-amber: #d29922;
        --accent-red: #f85149;
        --accent-purple: #a371f7;
        --radius-sm: 6px;
        --radius-md: 10px;
        --transition: 0.2s ease;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        margin: 24px;
        max-width: 720px;
        background: var(--bg-primary);
        color: var(--text-primary);
        line-height: 1.5;
      }

      h1 {
        margin: 0 0 24px;
        font-size: 20px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      h1 .logo {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
        border-radius: var(--radius-sm);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-muted);
        font-weight: 600;
      }

      .card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-md);
        padding: 16px;
        margin-bottom: 16px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 140px;
        gap: 12px 16px;
        align-items: center;
      }

      .grid label {
        font-size: 13px;
        color: var(--text-secondary);
      }

      .grid .hint {
        font-size: 11px;
        color: var(--text-muted);
        grid-column: 1;
      }

      input[type="number"],
      input[type="text"],
      select {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: var(--radius-sm);
        padding: 8px 10px;
        color: var(--text-primary);
        font-size: 13px;
        width: 100%;
        transition: border-color var(--transition);
      }

      input[type="number"]:focus,
      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: var(--accent-blue);
      }

      input[type="checkbox"] {
        width: 40px;
        height: 22px;
        appearance: none;
        background: var(--bg-tertiary);
        border-radius: 22px;
        position: relative;
        cursor: pointer;
        transition: background var(--transition);
      }

      input[type="checkbox"]::before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        background: var(--text-primary);
        border-radius: 50%;
        top: 3px;
        left: 3px;
        transition: transform var(--transition);
      }

      input[type="checkbox"]:checked {
        background: var(--accent-blue);
      }

      input[type="checkbox"]:checked::before {
        transform: translateX(18px);
      }

      .row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      button {
        background: var(--accent-blue);
        border: none;
        color: #fff;
        border-radius: var(--radius-sm);
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all var(--transition);
      }

      button:hover {
        background: #4393e6;
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      #status {
        margin-left: 12px;
        font-size: 12px;
      }

      #status.success {
        color: var(--accent-green);
      }

      #status.error {
        color: var(--accent-red);
      }

      .section-note {
        margin-top: 12px;
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
      }

      @media (max-width: 600px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .grid input[type="checkbox"] {
          justify-self: end;
        }
      }
    </style>
  </head>
  <body>
    <h1><span class="logo">🛡️</span> Submission Pattern Analyzer — Settings</h1>

    <section class="card">
      <h2>General</h2>
      <div class="grid">
        <label for="autoScanCodeforces">Auto-scan Codeforces</label>
        <input id="autoScanCodeforces" type="checkbox" />

        <label for="autoScanLeetCode">Auto-scan LeetCode</label>
        <input id="autoScanLeetCode" type="checkbox" />

        <label for="scanIntervalSeconds">Scan interval (30-300s)</label>
        <input id="scanIntervalSeconds" type="number" min="30" max="300" />

        <label for="minTierToShowBadge">Min tier to show badge</label>
        <select id="minTierToShowBadge">
          <option value="low">Low</option>
          <option value="medium">Medium</option>
          <option value="high">High</option>
        </select>

        <label for="storageRetentionDays">Storage retention (days)</label>
        <input id="storageRetentionDays" type="number" min="1" max="30" />
      </div>
    </section>

    <section class="card">
      <h2>Heuristic Weights (0-50)</h2>
      <div class="grid">
        <label for="weightH1">H-1 Solve Speed</label>
        <input id="weightH1" type="number" min="0" max="50" />

        <label for="weightH2">H-2 Rating Jump</label>
        <input id="weightH2" type="number" min="0" max="50" />

        <label for="weightH3">H-3 Cluster</label>
        <input id="weightH3" type="number" min="0" max="50" />

        <label for="weightH4">H-4 Dormant Surge</label>
        <input id="weightH4" type="number" min="0" max="50" />

        <label for="weightH5">H-5 Rapid Multi-Solve</label>
        <input id="weightH5" type="number" min="0" max="50" />
      </div>
    </section>

    <section class="card">
      <h2>ML Scoring</h2>
      <div class="grid">
        <label for="mlEnabled">Enable ML layer</label>
        <input id="mlEnabled" type="checkbox" />

        <label for="mlMode">Scoring mode</label>
        <select id="mlMode">
          <option value="heuristic">Heuristic only</option>
          <option value="hybrid">Hybrid</option>
          <option value="ml-only">ML only</option>
        </select>

        <label for="mlBlend">Hybrid blend (0-1)</label>
        <input id="mlBlend" type="number" min="0" max="1" step="0.05" />

        <label for="mlMinConfidence">Min confidence (0-1)</label>
        <input id="mlMinConfidence" type="number" min="0" max="1" step="0.05" />
      </div>
      <p class="section-note">Low-confidence ML output falls back to heuristic score per user.</p>
    </section>

    <div class="row">
      <button id="saveBtn" type="button">Save Settings</button>
      <span id="status"></span>
    </div>

    <script type="module" src="settings.js"></script>
  </body>
</html>
