<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Submission Pattern Analyzer</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <div class="logo">🛡️</div>
        <h1>Pattern Analyzer</h1>
      </header>

      <p id="contestLabel" class="contest-label">
        <span class="platform-badge" id="platformBadge">-</span>
        <span id="contestIdText">Detecting contest…</span>
      </p>

      <section class="card" id="summaryCard">
        <h2>Summary</h2>
        <div class="stats-grid">
          <div class="stat-item">
            <span class="stat-value" id="statTotal">-</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-item low">
            <span class="stat-value" id="statLow">-</span>
            <span class="stat-label">Low</span>
          </div>
          <div class="stat-item medium">
            <span class="stat-value" id="statMedium">-</span>
            <span class="stat-label">Med</span>
          </div>
          <div class="stat-item high">
            <span class="stat-value" id="statHigh">-</span>
            <span class="stat-label">High</span>
          </div>
        </div>
        <p id="freshness" class="freshness"></p>
        <p id="statusNote" class="status-note" hidden></p>
      </section>

      <section class="card">
        <h2>Top 10 Suspicious</h2>
        <ol id="topList" class="top-list"></ol>
      </section>

      <section class="card controls">
        <div class="row">
          <span>Enable overlay</span>
          <label class="toggle-switch">
            <input id="overlayToggle" type="checkbox" />
            <span class="toggle-slider"></span>
          </label>
        </div>
        <div class="row actions">
          <button id="refreshBtn" type="button" class="primary">↻ Refresh</button>
          <button id="settingsBtn" type="button">⚙️ Settings</button>
        </div>
        <p id="actionError" class="error-text" hidden></p>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
