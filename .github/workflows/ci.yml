name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        if: ${{ hashFiles('submission-pattern-analyzer/package-lock.json') != '' }}
        run: npm ci
        working-directory: submission-pattern-analyzer

      - name: Run tests
        run: npm test
        working-directory: submission-pattern-analyzer
